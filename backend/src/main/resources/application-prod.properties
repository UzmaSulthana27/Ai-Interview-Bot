# Production database \u2014 Aiven (uses Render env variables)
spring.datasource.url=jdbc:mysql://${AIVEN_HOST}:${AIVEN_PORT}/defaultdb?ssl-mode=REQUIRED
spring.datasource.username=${AIVEN_USERNAME}
spring.datasource.password=${AIVEN_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Groq AI
groq.api.key=${GROQ_API_KEY}

# Port \u2014 Render sets this automatically
server.port=${PORT:8080}